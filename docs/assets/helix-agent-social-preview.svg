<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">helix-agent social preview</title>
  <desc id="desc">Multi-provider MCP server for Claude Code with Ollama, Codex, and OpenAI-compatible agents.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#121a2b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="640" fill="url(#bg)"/>
  <circle cx="1080" cy="110" r="150" fill="#2563eb" opacity="0.10"/>
  <circle cx="180" cy="560" r="200" fill="#7c3aed" opacity="0.10"/>

  <text x="72" y="108" fill="#e5e7eb" font-family="Segoe UI, Arial, sans-serif" font-size="64" font-weight="700">helix-agent</text>
  <text x="72" y="154" fill="#93c5fd" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="600">Multi-provider MCP server for Claude Code</text>
  <text x="72" y="198" fill="#94a3b8" font-family="Segoe UI, Arial, sans-serif" font-size="24">Ollama + Codex + OpenAI-compatible APIs + background agents</text>

  <rect x="72" y="262" width="470" height="194" rx="26" ry="26" fill="url(#card)" stroke="#a78bfa" stroke-width="2"/>
  <rect x="96" y="290" width="58" height="58" rx="16" ry="16" fill="#a78bfa"/>
  <text x="125" y="328" text-anchor="middle" fill="#f5f3ff" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">M</text>
  <text x="176" y="325" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="600">One MCP surface</text>
  <text x="176" y="362" fill="#9ca3af" font-family="Segoe UI, Arial, sans-serif" font-size="22">think / agent_task / providers / spawn / wait</text>
  <text x="96" y="412" fill="#cbd5e1" font-family="Segoe UI, Arial, sans-serif" font-size="23">Consistent delegation flow:</text>
  <text x="96" y="448" fill="#60a5fa" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="600">spawn -> continue -> wait -> inspect -> close</text>

  <rect x="616" y="244" width="592" height="78" rx="20" ry="20" fill="#0f172a" stroke="#14b8a6" stroke-width="2"/>
  <text x="648" y="293" fill="#ecfeff" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="600">Ollama</text>
  <text x="816" y="293" fill="#94a3b8" font-family="Segoe UI, Arial, sans-serif" font-size="22">Local drafts, vision, OCR</text>

  <rect x="616" y="348" width="592" height="78" rx="20" ry="20" fill="#0f172a" stroke="#f59e0b" stroke-width="2"/>
  <text x="648" y="397" fill="#fffbeb" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="600">Codex CLI</text>
  <text x="816" y="397" fill="#94a3b8" font-family="Segoe UI, Arial, sans-serif" font-size="22">Repo-heavy implementation and review</text>

  <rect x="616" y="452" width="592" height="78" rx="20" ry="20" fill="#0f172a" stroke="#38bdf8" stroke-width="2"/>
  <text x="648" y="501" fill="#f0f9ff" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="600">OpenAI-compatible</text>
  <text x="905" y="501" fill="#94a3b8" font-family="Segoe UI, Arial, sans-serif" font-size="22">Hosted models via standard chat APIs</text>

  <text x="72" y="588" fill="#64748b" font-family="Segoe UI, Arial, sans-serif" font-size="20">github.com/tsunamayo7/helix-agent</text>
</svg>
