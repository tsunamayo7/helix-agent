    interval_minutes: 3
    criticality: high
  - name: Helix-AssistantDaemon
    interval_minutes: 5
    criticality: high
  - name: Helix-Watchdog
    interval_minutes: 5
    criticality: high
  - name: helix-hw-monitor
    interval_minutes: 5
    criticality: medium
  - name: Helix-UsageMonitor
    interval_minutes: 15
    criticality: medium
  - name: Helix-HealthServer
    interval_minutes: 1
    criticality: low
  - name: helix-x-monitor
    interval_minutes: 30
    criticality: low
  - name: X-Feed-Collector
    interval_minutes: 30
    criticality: medium
  - name: Helix-CMEMBridge
    interval_minutes: 5
    criticality: medium
  - name: Helix-ConversationLogger
    interval_minutes: 30
    criticality: low
  - name: Helix-DeptFeed
    interval_minutes: 30
    criticality: medium
  - name: Helix-Failover
    interval_minutes: 10
    criticality: high
  - name: Helix-Escalation
    interval_minutes: 10
    criticality: high
  - name: Helix-Backup
    interval_minutes: 1440  # daily 3:00
    criticality: high
  - name: Helix-IntegrityCheck
    interval_minutes: 1440  # daily 3:15
    criticality: medium
  - name: Helix-MemoryHealth
    interval_minutes: 1440  # daily 3:30
    criticality: medium
  - name: Helix-ContradictionCheck
    interval_minutes: 10080  # weekly Sun 4:00
    criticality: low
  - name: Helix-QdrantDedup
    interval_minutes: 10080  # weekly Sun 4:30
    criticality: low
  - name: Helix-SystemAudit
    interval_minutes: 720  # 12h
    criticality: low
  - name: Helix-HealthCheck
    interval_minutes: 60
    criticality: low

